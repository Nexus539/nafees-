<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nafees Clothes Shop</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a0a0a;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
border-bottom:1px solid #222;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.product{
background:#111;
border-radius:12px;
overflow:hidden;
transition:0.3s;
border:1px solid #222;
}

.product:hover{
transform:translateY(-6px);
border-color:#555;
}

.product img{
width:100%;
height:260px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-name{
font-size:18px;
margin-bottom:6px;
}

.price{
color:#bbb;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:white;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#ddd;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #222;
margin-top:40px;
color:#888;
}
</style>
</head>

<body>

<header>
Nafees Clothes Shop
</header>

<div class="container">

<div class="grid">

<div class="product">
<img src="https://images.unsplash.com/photo-1520975922203-b1d6a4f2fef0"/>
<div class="product-info">
<div class="product-name">Oversized Graphic Tee</div>
<div class="price">₹999</div>
<button>Buy Now</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1618354691264-3a6f8c58c2c1"/>
<div class="product-info">
<div class="product-name">Streetwear Hoodie</div>
<div class="price">₹1799</div>
<button>Buy Now</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"/>
<div class="product-info">
<div class="product-name">Bootcut Denim</div>
<div class="price">₹1499</div>
<button>Buy Now</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1520974735194-3f6d24d8e8d4"/>
<div class="product-info">
<div class="product-name">Minimal Black Tee</div>
<div class="price">₹799</div>
<button>Buy Now</button>
</div>
</div>

</div>

</div>

<footer>
© 2026 Nafees Clothes Shop
</footer>

</body>
</html>
