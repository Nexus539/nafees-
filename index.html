<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nafees Streetwear</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid #1f1f1f;
position:sticky;
top:0;
background:#0b0b0b;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing:2px;
}

nav a{
text-decoration:none;
color:#ccc;
margin-left:25px;
font-size:14px;
transition:.3s;
}

nav a:hover{
color:white;
}

.hero{
height:50vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

.products{
padding:60px 8%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.card{
background:#121212;
border-radius:16px;
overflow:hidden;
transition:transform .3s, box-shadow .3s;
border:1px solid #1f1f1f;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card-title{
font-size:18px;
margin-bottom:6px;
}

.price{
color:#9e9e9e;
margin-bottom:12px;
}

.buy-btn{
width:100%;
padding:10px;
border:none;
background:white;
color:black;
font-weight:600;
border-radius:6px;
cursor:pointer;
transition:.25s;
}

.buy-btn:hover{
background:#e6e6e6;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid #1f1f1f;
color:#888;
margin-top:40px;
}

@media (max-width:768px){
.hero h1{
font-size:34px;
}

nav{
display:none;
}
}

</style>

</head>

<body>

<header>
<div class="logo">NAFEES</div>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">New</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Streetwear That Speaks</h1>
<p>Nafees Clothes Shop — Modern Streetwear Collection</p>
</section>

<section class="products">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975922203-b1d6a4f2fef0">
<div class="card-content">
<div class="card-title">Oversized Graphic Tee</div>
<div class="price">₹999</div>
<button class="buy-btn">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1618354691264-3a6f8c58c2c1">
<div class="card-content">
<div class="card-title">Street Hoodie</div>
<div class="price">₹1799</div>
<button class="buy-btn">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<div class="card-content">
<div class="card-title">Bootcut Denim</div>
<div class="price">₹1499</div>
<button class="buy-btn">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520974735194-3f6d24d8e8d4">
<div class="card-content">
<div class="card-title">Minimal Black Tee</div>
<div class="price">₹799</div>
<button class="buy-btn">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<div class="card-content">
<div class="card-title">Urban Cargo Pants</div>
<div class="price">₹1899</div>
<button class="buy-btn">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="card-content">
<div class="card-title">Classic Street Tee</div>
<div class="price">₹899</div>
<button class="buy-btn">Buy Now</button>
</div>
</div>

</div>

</section>

<footer>
© 2026 Nafees Clothes Shop — Streetwear Brand
</footer>

</body>
</html>
